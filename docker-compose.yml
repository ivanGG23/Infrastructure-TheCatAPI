version: '3.8'

services:

  backend:
    build:
      context: ../backend-TheCatAPI    
      dockerfile: ../infrastructure-TheCatAPI/docker/backend.Dockerfile
    container_name: cat-api-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - PORT=4000
      - THECAT_API_KEY=${THECAT_API_KEY}
      - THECAT_API_BASE_URL=${THECAT_API_BASE_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend-TheCathAPI
      dockerfile: ../infrastructure-TheCatAPI/docker/frontend.Dockerfile
    container_name: cat-api-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend 
    restart: unless-stopped